<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiGold - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; }
        .box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; width: 350px; backdrop-filter: blur(10px); box-shadow: 0 15px 25px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: #d4af37; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #d4af37; border: none; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b8962e; }
        .error { color: #ff6b6b; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Welcome to DigiGold</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="phone" placeholder="Enter Phone Number" required pattern="[0-9]{10}" title="Enter 10 digit phone number">
            
            <!-- Show Name field only if triggered by backend (new user) -->
            {% if show_name_field %}
                <input type="text" name="name" placeholder="Enter Your Full Name" required>
            {% endif %}
            
            <button type="submit">Get OTP</button>
        </form>
    </div>
</body>
</html>
