<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Save Manually</title>
    <style>
        body{font-family: 'Segoe UI', Arial, sans-serif; margin:0; background:#f5f6f8}
        .topbar{background:#fff;padding:14px 16px;border-bottom:1px solid #eee}
        .back{display:inline-block;margin-right:12px;cursor:pointer}
        .rate-row{background:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin:12px;border-radius:8px}
        .rate-label{color:#666}
        .timer{font-weight:700}

        .card{background:#fff;margin:16px;border-radius:12px;padding:18px}
        .choice-row{display:flex;gap:16px;margin-bottom:12px}
        .choice{display:flex;align-items:center;gap:8px;cursor:pointer}
        .choice input{accent-color:#6f2dbd}

        .amount-box{border:2px solid #6f2dbd;border-radius:12px;padding:18px;display:flex;justify-content:space-between;align-items:center;font-size:1.6rem;font-weight:700}
        .amount-box .sub{font-size:0.9rem;font-weight:500;color:#888}

        .presets{display:flex;gap:12px;margin-top:14px}
        .preset{flex:1;padding:10px;border-radius:10px;border:1px solid #ddd;text-align:center;cursor:pointer}
        .preset.active{background:#6f2dbd;color:#fff;border-color:transparent}

        .proceed-wrap{position:fixed;left:12px;right:12px;bottom:18px}
        .proceed{background:#6f2dbd;color:#fff;padding:16px;border-radius:12px;text-align:center;font-size:1.1rem;font-weight:700;cursor:pointer}
    </style>
</head>
<body>
    <div class="topbar">
        <span class="back" onclick="history.back()">←</span>
        <span style="font-weight:700">Save Manually</span>
    </div>

    <div class="rate-row">
        <div>
            <div style="font-size:0.95rem;color:#666">Buy Rate: <strong id="rate-display">-</strong>/gm</div>
        </div>
        <div style="text-align:right">
            <div style="font-size:0.9rem;color:#666">Valid For:</div>
            <div class="timer" id="valid-timer">--:--</div>
        </div>
    </div>

    <div class="card">
        <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px">Start your savings journey</div>
        <div class="choice-row">
            <label class="choice"><input type="radio" name="mode" value="rupees" checked> Buy in Rupees</label>
            <label class="choice"><input type="radio" name="mode" value="grams"> Buy in Grams</label>
        </div>

        <div class="amount-box">
            <div style="flex:1; display:flex; align-items:center; gap:12px">
                <span id="currency-symbol">₹</span>
                <input id="amount-input" type="text" value="200" style="font-size:1.6rem; font-weight:700; border:none; background:transparent; outline:none; width:100%;">
                <span id="unit-label" style="display:none">gm</span>
            </div>
            <div class="sub" id="equiv">0.0121 gm</div>
        </div>

        <div class="presets">
            <div class="preset" data-value="10">₹10</div>
            <div class="preset" data-value="50">₹50</div>
            <div class="preset" data-value="150">₹150</div>
            <div class="preset active" data-value="200">₹200<br><small style="background:#ffd54a;padding:2px 6px;border-radius:6px;color:#333">Popular</small></div>
            <div class="preset" data-value="250">₹250</div>
        </div>
    </div>

    <div class="proceed-wrap">
        <div class="proceed" id="proceed">Proceed</div>
    </div>

<script>
    const params = new URLSearchParams(location.search);
    const selectedMetal = params.get('metal') || '{{ metal }}';
    let rate = 0;
    let mode = 'rupees'; // 'rupees' or 'grams'
    const amountInput = document.getElementById('amount-input');
    const currencySymbol = document.getElementById('currency-symbol');
    const unitLabel = document.getElementById('unit-label');
    const equivEl = document.getElementById('equiv');
    const rateEl = document.getElementById('rate-display');

    function fetchRate(){
        fetch('/get_rate?metal=' + encodeURIComponent(selectedMetal))
            .then(r=>r.json())
            .then(d=>{ rate = Number(d.rate); rateEl.innerText = '₹' + rate.toFixed(2); updateEquivalent(); });
    }

    function updateEquivalent(){
        let raw = (amountInput.value || '').toString();
        let value = Number(raw.replace(/[^0-9.]/g, '') || 0);
        if(mode === 'rupees'){
            let grams = rate > 0 ? (value / rate) : 0;
            equivEl.innerText = grams.toFixed(4) + ' gm';
        } else {
            let rupees = value * rate;
            equivEl.innerText = '₹' + rupees.toFixed(2);
        }
    }

    document.querySelectorAll('.preset').forEach(p => {
        p.addEventListener('click', ()=>{
            document.querySelectorAll('.preset').forEach(x=>x.classList.remove('active'));
            p.classList.add('active');
            const val = p.getAttribute('data-value');
            if(mode === 'grams'){
                let grams = rate > 0 ? (Number(val) / rate) : 0;
                amountInput.value = grams.toFixed(4);
            } else {
                amountInput.value = Number(val).toFixed(2);
            }
            updateEquivalent();
        });
    });

    document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener('change', e => {
        mode = e.target.value;
        if(mode === 'grams'){
            unitLabel.style.display = '';
            currencySymbol.style.display = 'none';
            // convert current rupee amount to grams
            let rupees = Number((amountInput.value || '').toString().replace(/[^0-9.]/g,'') || 0);
            let grams = rate > 0 ? (rupees / rate) : 0;
            amountInput.value = grams.toFixed(4);
        } else {
            unitLabel.style.display = 'none';
            currencySymbol.style.display = '';
            amountInput.value = '200.00';
        }
        updateEquivalent();
    }));

    // Inline editing: sanitize and update on input/blur
    amountInput.addEventListener('input', () => {
        let v = amountInput.value.replace(/[^0-9.]/g, '');
        const parts = v.split('.');
        if(parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
        amountInput.value = v;
        updateEquivalent();
    });

    amountInput.addEventListener('blur', () => {
        let v = Number((amountInput.value || '').replace(/[^0-9.]/g,'') || 0);
        if(mode === 'grams') amountInput.value = v.toFixed(4);
        else amountInput.value = v.toFixed(2);
        updateEquivalent();
    });

    // timer (visual only)
    let timer = 150;
    function tick(){
        timer--; if(timer<0) timer=150;
        let mm = String(Math.floor(timer/60)).padStart(2,'0');
        let ss = String(timer%60).padStart(2,'0');
        document.getElementById('valid-timer').innerText = mm + ':' + ss;
    }
    setInterval(tick,1000);
    tick();

    // Proceed -> go to payment with rupee amount. If mode == grams, convert to rupees first
    document.getElementById('proceed').addEventListener('click', ()=>{
        let primary = Number((amountInput.value || '').toString().replace(/[^0-9.]/g,'') || 0);
        let amountRupees = (mode === 'rupees') ? primary : (primary * rate);
        amountRupees = Number(amountRupees.toFixed(2));
        // redirect to payment page with metal param
        window.location.href = '/payment/' + amountRupees + '?metal=' + encodeURIComponent(selectedMetal);
    });

    // init
    fetchRate();
</script>
</body>
</html>
