<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; }
        .box { background: #fff; padding: 40px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 15px 25px rgba(0,0,0,0.5); }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 20px; }
        .otp-inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { width: 40px; height: 50px; text-align: center; font-size: 1.5em; border: 2px solid #ddd; border-radius: 8px; }
        input[type="text"]:focus { border-color: #7b2cbf; outline: none; }
        button { width: 100%; padding: 12px; background: #7b2cbf; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .hint { margin-top: 15px; color: #888; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Verify Details</h2>
        <p>OTP sent to +91 {{ phone }}</p>
        
        <form method="POST">
            <div class="otp-inputs" style="width:100%">
                <!-- Simple OTP simulation -->
                <input type="text" name="otp" maxlength="6" placeholder="123456" required style="width:100%; box-sizing:border-box;">
            </div>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <p style="color:red; font-size:0.8em;">{{ messages[0] }}</p>
                {% endif %}
            {% endwith %}

            <button type="submit">VERIFY OTP</button>
        </form>
        <div class="hint">Hint: Use OTP <b>123456</b> for testing</div>
    </div>
</body>
</html>
