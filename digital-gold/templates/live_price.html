<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Price</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family: 'Segoe UI', Arial, sans-serif; background:#f5f6f8}
        .topbar{background:linear-gradient(90deg,#6f2dbd,#4e1e9b);color:#fff;padding:16px;display:flex;justify-content:space-between;align-items:center}
        .back-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}
        .container{max-width:420px;margin:0 auto;padding:16px}
        
        .header-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px}
        .title{font-size:0.9rem;color:#666;font-weight:600}
        .message{font-size:1.2rem;color:#333;font-weight:700;margin:8px 0}
        .highlight{color:#ffd54a;text-decoration:underline}
        
        .metrics{display:flex;gap:16px;margin-top:12px}
        .metric{flex:1}
        .metric-label{font-size:0.85rem;color:#666}
        .metric-value{font-size:1.1rem;font-weight:700;margin-top:4px}
        .metric-value.down{color:#d32f2f}
        
        .chart-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px}
        .chart-wrap{position:relative;height:240px;margin:16px 0}
        .chart-wrap .no-data{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#777;font-weight:700}
        
        .time-buttons{display:flex;gap:8px;margin-bottom:16px}
        .time-btn{flex:1;padding:8px;border:1px solid #ddd;background:#fff;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.9rem}
        .time-btn.active{background:#6f2dbd;color:#fff;border-color:#6f2dbd}
        
        .invest-wrap{position:fixed;left:16px;right:16px;bottom:20px}
        .invest{display:block;background:#6f2dbd;color:#fff;padding:14px;border-radius:10px;text-align:center;text-decoration:none;font-weight:700;font-size:1rem}
    </style>
</head>
<body>
    <div class="topbar">
        <span style="font-weight:700">Live Price 🔔</span>
        <button class="back-btn" onclick="history.back()">←</button>
    </div>

    <div class="container" style="padding-bottom:100px">
        <div class="header-card">
            <div class="title">Wanting to Buy {{ 'Silver' if metal=='silver' else 'Gold' }}?</div>
            <div class="message">The next Best Time to buy <span style="text-transform:capitalize">{{ metal }}</span> is <span class="highlight">Now!!</span></div>
            
            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">Performance 1M</div>
                    <div class="metric-value down" id="perf">-1.27%</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Live Price</div>
                    <div class="metric-value" id="live-price-display">₹ {{ "%.2f"|format(rate) }}/gm</div>
                </div>
            </div>
        </div>

        <div class="chart-card">
            <div class="time-buttons">
                <button class="time-btn active" data-period="1M" onclick="changePeriod('1M')">1M</button>
                <button class="time-btn" data-period="3M" onclick="changePeriod('3M')">3M</button>
                <button class="time-btn" data-period="6M" onclick="changePeriod('6M')">6M</button>
                <button class="time-btn" data-period="1Y" onclick="changePeriod('1Y')">1Y</button>
            </div>
            <div class="chart-wrap">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
    </div>

    <div class="invest-wrap">
        <a class="invest" href="/save_manually?metal={{ metal }}">Invest Now!</a>
    </div>

    <script>
        const selectedMetal = '{{ metal }}';
        const baseRate = parseFloat('{{ rate }}') || 0;
        let chartInstance = null;
        let currentPeriod = '1M';
        let fullHistory = [];
        const noDataElId = 'no-data-overlay';

        // Fetch real price history from backend
        function fetchPriceHistory(){
            fetch('/get_price_history?metal=' + encodeURIComponent(selectedMetal))
                .then(r => {
                    if(!r.ok) throw new Error('Failed to fetch history: ' + r.status);
                    return r.json();
                })
                .then(d => {
                    fullHistory = Array.isArray(d.history) ? d.history : [];
                    renderChart();
                }).catch((err) => {
                    console.error('Failed to fetch price history', err);
                    fullHistory = [];
                    renderChart();
                });
        }

        // Filter history by period
        function filterByPeriod(period){
            if(fullHistory.length === 0) return {labels: [], data: []};
            
            let maxItems = 30; // 1M (each entry ~2 mins)
            if(period === '3M') maxItems = 90;
            else if(period === '6M') maxItems = 180;
            else if(period === '1Y') maxItems = 360;

            const filtered = fullHistory.slice(Math.max(0, fullHistory.length - maxItems));
            const labels = filtered.map(d => d.time);
            const data = filtered.map(d => d.price);
            return {labels, data};
        }

        // Render chart with real data
        function renderChart(){
            const chartData = filterByPeriod(currentPeriod);
            const ctx = document.getElementById('priceChart').getContext('2d');
            // remove existing no-data overlay
            const wrap = document.querySelector('.chart-wrap');
            let noDataEl = document.getElementById(noDataElId);
            if(noDataEl) noDataEl.remove();
            
            if(chartInstance) chartInstance.destroy();

            // If there's no data, show a friendly message over the chart area
            if(!chartData.data || chartData.data.length === 0){
                noDataEl = document.createElement('div');
                noDataEl.id = noDataElId;
                noDataEl.className = 'no-data';
                noDataEl.innerText = 'No price history available yet';
                wrap.appendChild(noDataEl);
                // Clear existing canvas
                ctx.clearRect(0,0, ctx.canvas.width, ctx.canvas.height);
                return;
            }

            // Calculate performance change
            if(fullHistory.length > 1){
                const oldPrice = fullHistory[0].price;
                const newPrice = fullHistory[fullHistory.length - 1].price;
                const change = ((newPrice - oldPrice) / oldPrice * 100).toFixed(2);
                const perfEl = document.getElementById('perf');
                if(perfEl){
                    perfEl.textContent = (change > 0 ? '+' : '') + change + '%';
                    perfEl.className = 'metric-value ' + (change < 0 ? 'down' : '');
                }
            }
            // choose colors based on metal
            const colorBorder = (selectedMetal === 'silver') ? '#9ea3a8' : '#ffd54a';
            const colorBg = (selectedMetal === 'silver') ? 'rgba(158,163,168,0.08)' : 'rgba(255, 213, 74, 0.12)';

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: '₹/gm',
                        data: chartData.data,
                        borderColor: colorBorder,
                        backgroundColor: colorBg,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2,
                        pointBackgroundColor: colorBorder
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {display: false}
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {color: '#f0f0f0'},
                            ticks: {font: {size: 12}}
                        },
                        x: {
                            grid: {display: false},
                            ticks: {font: {size: 11}, maxRotation: 45}
                        }
                    }
                }
            });
        }

        // Change time period
        function changePeriod(period){
            currentPeriod = period;
            document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-period="${period}"]`).classList.add('active');
            renderChart();
        }

        // Fetch live rate and update display
        function updateLivePrice(){
            fetch('/get_rate?metal=' + encodeURIComponent(selectedMetal))
                .then(r => r.json())
                .then(d => {
                    document.getElementById('live-price-display').innerText = '₹ ' + Number(d.rate).toFixed(2) + '/gm';
                }).catch(()=>{});
        }

        // Initialize
        fetchPriceHistory();
        updateLivePrice();
        setInterval(updateLivePrice, 5000);
        setInterval(fetchPriceHistory, 45000);
    </script>
</body>
</html>
